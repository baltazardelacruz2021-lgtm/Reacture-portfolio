<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reacture Portfolio</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0D1117;
            color: #f0f6fc;
            min-height: 100vh;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0D1117;
            gap: 16px;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash-title {
            font-family: monospace;
            font-size: 22px;
            color: #67e8f9;
            letter-spacing: 0.08em;
        }

        #splash-sub {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(103, 232, 249, 0.2);
            border-top-color: #67e8f9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #root {
            min-height: 100vh;
        }

        #error-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0D1117;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            padding: 32px;
            text-align: center;
            z-index: 99999;
        }

        #error-overlay.visible {
            display: flex;
        }

        #error-title {
            font-family: monospace;
            font-size: 18px;
            color: #f85149;
        }

        #error-message {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
            max-width: 480px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #161b22;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: left;
        }
    </style>
</head>

<body>

    <div id="splash">
        <div class="spinner"></div>
        <div id="splash-title">Reacture</div>
        <div id="splash-sub">Loading your portfolio...</div>
    </div>

    <div id="error-overlay">
        <div id="error-title">⚠️ Runtime Error</div>
        <pre id="error-message"></pre>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

// Header Component
function Header() {
  return (
    <header style={{ padding: "20px", borderBottom: "2px solid #ccc" }}>
      <h1>Baltazar Dela Cruz</h1>
      <p>Frontend Developer & React Enthusiast</p>
    </header>
  );
}

// About Component with visit counter
function About() {
  const [visits, setVisits] = React.useState(0);
  
  return (
    <section style={{ padding: "20px" }}>
     <h2>About</h2>
        <p>
          I'm a passionate frontend developer with 5+ years of experience building 
          scalable web applications. I specialize in React, TypeScript, and modern 
          web technologies, with a keen eye for user experience and performance optimization.
        </p>
        <p>
          When I'm not coding, you'll find me contributing to open source projects, 
          mentoring junior developers, or exploring the latest in web development trends.
        </p>
      <p>Profile views: {visits}</p>
      <button onClick={() => setVisits(v => v + 1)}>
        👁️ View Profile
      </button>
    </section>
  );
}

// Projects Component with filtering
function Projects() {
  const [filter, setFilter] = React.useState("All");
  const [projects] = React.useState([
    { id: 1, name: "Portfolio Website", type: "React" },
    { id: 2, name: "Weather App", type: "React" },
    { id: 3, name: "Landing Page", type: "HTML" },
    { id: 4, name: "Task Tracker", type: "React" }
  ]);

  const visibleProjects = filter === "All"
    ? projects
    : projects.filter(p => p.type === filter);

  return (
    <section style={{ padding: "20px" }}>
      <h2>Projects ({visibleProjects.length})</h2>
      
      <div style={{ marginBottom: "15px" }}>
        <button onClick={() => setFilter("All")}>All</button>
        <button onClick={() => setFilter("React")}>React</button>
        <button onClick={() => setFilter("HTML")}>HTML</button>
      </div>
      
      <ul>
        {visibleProjects.map(project => (
          <li key={project.id}>
            <strong>{project.name}</strong> - {project.type}
          </li>
        ))}
      </ul>
    </section>
  );
}

function Contact() {
  const [open, setOpen] = React.useState(false);
  const [name, setName] = React.useState("");
  const emailRef = React.useRef(null);

  return (
    <section style={{ padding: "20px" }}>
      <h2>Contact</h2>
      
      <button onClick={() => setOpen(!open)}>
        {open ? "Hide Form ✕" : "Show Form ✉️"}
      </button>
      
      {open && (
        <div style={{ marginTop: "15px" }}>
          <input
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Your name"
            style={{ display: "block", marginBottom: "10px", padding: "8px" }}
          />
          
          <input
            ref={emailRef}
            placeholder="Your email"
            type="email"
            style={{ display: "block", marginBottom: "10px", padding: "8px" }}
          />
          
          <button onClick={() => emailRef.current.focus()}>
            Focus Email
          </button>
          
          <p>Hello, {name || "Guest"}!</p>
        </div>
      )}
    </section>
  );
}

  const [theme, setTheme] = useTheme();

      {/* Header */}
      <Header />

        <button onClick={() => setTab("About")}>About</button>

        borderTop: `2px solid ${isDark ? "#444" : "#ddd"}`,
        marginTop: "40px"
      }}>
        <p>© 2024 Baltazar Dela Cruz. Built with React & Reacture 🚀</p>
      </footer>
    </main>
  );

    <script>
        (function () {
            function hideSplash() {
                var root = document.getElementById('root');
                var splash = document.getElementById('splash');
                if (root && root.children.length > 0) {
                    splash.classList.add('hidden');
                    setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 500);
                } else {
                    setTimeout(hideSplash, 100);
                }
            }

            window.addEventListener('error', function (event) {
                document.getElementById('splash').classList.add('hidden');
                var overlay = document.getElementById('error-overlay');
                overlay.classList.add('visible');
                document.getElementById('error-message').textContent =
                    (event.error && event.error.message) || String(event.message || event);
            });

            window.addEventListener('load', function () { setTimeout(hideSplash, 300); });
        })();
    </script>
